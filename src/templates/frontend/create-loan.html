{% extends 'frontend/base.html' %}
{% block content %}
<div data-page="create-loan">
    <h3>Create Loan</h3>
    <form id="createLoanForm" class="card card-body">
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">Borrower User ID</label><input name="borrower_id" class="form-control" type="number" required></div>
            <div class="col-md-4"><label class="form-label">Principal Amount</label><input name="principal_amount" class="form-control" value="1000.00" required></div>
            <div class="col-md-2"><label class="form-label">Currency</label><input name="currency" class="form-control" value="USD" required></div>
            <div class="col-md-3"><label class="form-label">Interest Rate</label><input name="interest_rate" class="form-control" value="8.50" required></div>
            <div class="col-md-3"><label class="form-label">Term Months</label><input name="repayment_term_months" class="form-control" type="number" value="12" required></div>
            <div class="col-md-3"><label class="form-label">Start Date</label><input name="starts_at" class="form-control" type="date" required></div>
            <div class="col-md-3"><label class="form-label">End Date</label><input name="ends_at" class="form-control" type="date" required></div>
            <div class="col-md-6"><label class="form-label">Purpose</label><input name="purpose" class="form-control" value="General purpose"></div>
            <div class="col-12"><button class="btn btn-primary" type="submit">Create Loan</button></div>
        </div>
    </form>
    <h5 class="mt-3">Result</h5>
    <pre id="createLoanResult"></pre>
</div>
{% endblock %}
