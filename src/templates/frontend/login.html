{% extends 'frontend/base.html' %}
{% block content %}
<div class="row justify-content-center" data-page="login">
    <div class="col-md-6">
        <h3>Login</h3>
        <form id="loginForm" class="card card-body">
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input class="form-control" name="mobile_number" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button class="btn btn-primary" type="submit">Login</button>
            <p class="mt-3 mb-0 text-muted">New here? <a href="/app/register/">Create Account</a></p>
        </form>
    </div>
</div>
{% endblock %}
