{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Peer Lending Frontend</title>
    <link rel="icon" type="image/x-icon" href="{% static 'rest_framework/docs/img/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'frontend/app.css' %}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/app/dashboard/">Peer Lending</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="appNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/app/login/">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/dashboard/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/create-loan/">Create Loan</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/loan-list/">Loan List</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/loan-detail/">Loan Detail</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/repayment/">Repayment</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/family-ledger/">Family Ledger</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/transactions/">Transactions</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/discovered-accounts/">Discovered Accounts</a></li>
                <li class="nav-item"><a class="nav-link" href="/app/notifications/">Notifications</a></li>
            </ul>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm" type="button">Logout</button>
        </div>
    </div>
</nav>
<div class="container pb-5">
    <div id="flash" class="alert d-none" role="alert"></div>
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'frontend/app.js' %}?v=20260707-register-fix"></script>
</body>
</html>
