{% extends 'frontend/base.html' %}
{% block content %}
<div class="row justify-content-center" data-page="register">
    <div class="col-md-6">
        <h3>Create Account</h3>
        <form id="registerForm" class="card card-body" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" name="name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input class="form-control" name="mobile_number" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" name="password_confirm" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Profile Image (Optional)</label>
                <input type="file" class="form-control" name="profile_image" accept="image/*">
            </div>
            <div class="mb-3">
                <label class="form-label">Gmail Address (Optional)</label>
                <input type="email" class="form-control" name="gmail_address" placeholder="name@gmail.com">
            </div>
            <button class="btn btn-primary" type="submit">Register</button>
            <p class="mt-3 mb-0 text-muted">Already have an account? <a href="/app/login/">Login</a></p>
        </form>
    </div>
</div>
{% endblock %}
